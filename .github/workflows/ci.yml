name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q analysis attackers demos detectors oracles scenarios splits metrics.py run_benchmark.py

      - name: Run tests
        run: pytest -q

      - name: Run maintained reproduction workflow
        run: OUTPUT_DIR=/tmp/agentic-misuse-reproduced bash scripts/reproduce_key_results.sh
